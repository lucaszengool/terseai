<svg width="820" height="200" viewBox="0 0 820 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes dot1 { 0%,100%{opacity:0;transform:translateX(0)}  10%{opacity:1} 85%{opacity:1;transform:translateX(480px)} 90%,100%{opacity:0;transform:translateX(480px)} }
      @keyframes dot2 { 0%,15%{opacity:0;transform:translateX(0)} 25%{opacity:1} 90%{opacity:1;transform:translateX(480px)} 95%,100%{opacity:0;transform:translateX(480px)} }
      @keyframes dot3 { 0%,25%{opacity:0;transform:translateX(0)} 35%{opacity:1} 95%{opacity:1;transform:translateX(480px)} 100%{opacity:0;transform:translateX(480px)} }
      @keyframes boxPulse1 { 0%,100%{fill:#161b22} 18%,22%{fill:#1a2e1a;stroke:#3fb950} }
      @keyframes boxPulse2 { 0%,100%{fill:#161b22} 36%,40%{fill:#1a2e1a;stroke:#3fb950} }
      @keyframes boxPulse3 { 0%,100%{fill:#161b22} 52%,56%{fill:#1a2e1a;stroke:#3fb950} }
      @keyframes boxPulse4 { 0%,100%{fill:#161b22} 68%,72%{fill:#1a2e1a;stroke:#3fb950} }
      @keyframes boxPulse5 { 0%,100%{fill:#161b22} 84%,88%{fill:#1a2e1a;stroke:#3fb950} }
      @keyframes savingsPop { 0%,80%{opacity:0;transform:scale(0.8)} 90%,100%{opacity:1;transform:scale(1)} }

      .box  { fill:#161b22; stroke:#30363d; stroke-width:1.2; rx:6; animation-duration:3.5s; animation-iteration-count:infinite; animation-timing-function:ease; }
      .blabel { font:700 10px/1 'SF Mono','Fira Code',monospace; fill:#c9d1d9; text-anchor:middle; }
      .bsub   { font:9px/1 'SF Mono','Fira Code',monospace;   fill:#8b949e; text-anchor:middle; }
      .arw    { fill:none; stroke:#30363d; stroke-width:1.5; marker-end:url(#arr); }
      .savings { animation: savingsPop 3.5s infinite; }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="820" height="200" fill="#0d1117" rx="10"/>

  <!-- Title -->
  <text x="410" y="22" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing=".08em">PROCESSING PIPELINE</text>

  <!-- Boxes y=45 height=80 -->
  <!-- Input -->
  <rect x="20"  y="45" width="110" height="80" rx="6" class="box" style="animation-name:boxPulse1"/>
  <text x="75"  y="83" class="blabel">YOUR</text>
  <text x="75"  y="97" class="blabel">PROMPT</text>
  <text x="75"  y="112" class="bsub">raw input</text>

  <!-- Arrow -->
  <line x1="130" y1="85" x2="155" y2="85" class="arw"/>

  <!-- Compressor -->
  <rect x="155" y="45" width="120" height="80" rx="6" class="box" style="animation-name:boxPulse2"/>
  <text x="215" y="78" class="blabel">LINGUISTIC</text>
  <text x="215" y="92" class="blabel">COMPRESSOR</text>
  <text x="215" y="107" class="bsub">−22–50%</text>
  <text x="215" y="118" class="bsub">tokens</text>

  <!-- Arrow -->
  <line x1="275" y1="85" x2="300" y2="85" class="arw"/>

  <!-- Memory -->
  <rect x="300" y="45" width="110" height="80" rx="6" class="box" style="animation-name:boxPulse3"/>
  <text x="355" y="83" class="blabel">WORKING</text>
  <text x="355" y="97" class="blabel">MEMORY</text>
  <text x="355" y="112" class="bsub">−75–85%</text>

  <!-- Arrow -->
  <line x1="410" y1="85" x2="435" y2="85" class="arw"/>

  <!-- Router -->
  <rect x="435" y="45" width="110" height="80" rx="6" class="box" style="animation-name:boxPulse4"/>
  <text x="490" y="83" class="blabel">MODEL</text>
  <text x="490" y="97" class="blabel">ROUTER</text>
  <text x="490" y="112" class="bsub">haiku/sonnet</text>
  <text x="490" y="123" class="bsub">/opus</text>

  <!-- Arrow -->
  <line x1="545" y1="85" x2="570" y2="85" class="arw"/>

  <!-- Provider -->
  <rect x="570" y="45" width="110" height="80" rx="6" class="box" style="animation-name:boxPulse5"/>
  <text x="625" y="83" class="blabel">PROVIDER</text>
  <text x="625" y="97" class="blabel">API</text>
  <text x="625" y="112" class="bsub">Anthropic</text>
  <text x="625" y="123" class="bsub">OpenAI</text>

  <!-- Arrow to savings -->
  <line x1="680" y1="85" x2="705" y2="85" class="arw"/>

  <!-- Savings badge -->
  <g class="savings">
    <rect x="705" y="52" width="100" height="66" rx="6" fill="#1a2e1a" stroke="#3fb950" stroke-width="1.5"/>
    <text x="755" y="78" font-family="'SF Mono','Fira Code',monospace" font-size="18" font-weight="700" fill="#3fb950" text-anchor="middle">40–</text>
    <text x="755" y="96" font-family="'SF Mono','Fira Code',monospace" font-size="18" font-weight="700" fill="#3fb950" text-anchor="middle">70%</text>
    <text x="755" y="111" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#3fb950" text-anchor="middle">SAVED</text>
  </g>

  <!-- Flowing dots (3 staggered) -->
  <circle r="4" fill="#3fb950" cx="75" cy="85" style="animation:dot1 3.5s 0s infinite linear"/>
  <circle r="3" fill="#58a6ff" cx="75" cy="85" style="animation:dot2 3.5s 0.4s infinite linear; opacity:0"/>
  <circle r="3.5" fill="#d2a8ff" cx="75" cy="85" style="animation:dot3 3.5s 0.8s infinite linear; opacity:0"/>

  <!-- Bottom note -->
  <text x="410" y="178" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#8b949e" text-anchor="middle">every module is standalone · compose as many or as few layers as you need</text>
</svg>
