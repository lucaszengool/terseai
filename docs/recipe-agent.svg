<svg width="820" height="260" viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes turnIn   { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
      @keyframes barGrow  { from{width:0} to{width:var(--bw)} }
      @keyframes windowHL { 0%,100%{stroke:#30363d} 50%{stroke:#3fb950;stroke-width:2} }
      @keyframes tokenFlat{ 0%{opacity:0} 100%{opacity:1} }
      @keyframes evictPulse{ 0%,80%{opacity:0} 85%{opacity:1;fill:#f85149} 95%{opacity:.5;fill:#f85149} 100%{opacity:0} }
      @keyframes arrowBounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(3px)} }

      .mono { font-family:'SF Mono','Fira Code','Courier New',monospace; }
      .lbl  { font-size:10px; font-weight:700; fill:#8b949e; letter-spacing:.06em; }
      .turn { font-size:10px; }
      .tok  { font-size:9px; font-weight:700; }
    </style>
  </defs>

  <rect width="820" height="260" fill="#0d1117" rx="10"/>
  <text x="410" y="20" class="mono lbl" text-anchor="middle">RECIPE 2 — LONG-RUNNING AGENT · MEMORY STAYS FLAT AS TURNS GROW</text>

  <!-- Turn timeline -->
  <text x="20" y="40" class="mono lbl">CONVERSATION TURNS</text>
  <text x="600" y="40" class="mono lbl">TOKEN COUNT OVER TIME</text>

  <!-- 10 turns -->
  <!-- Turn 1 -->
  <rect x="16"  y="46" width="530" height="16" fill="#1a2e1a" rx="3" style="animation:turnIn .3s .1s both;opacity:0"/>
  <text x="22"  y="58" class="mono turn" fill="#3fb950" style="animation:turnIn .3s .1s both;opacity:0">Turn  1  user: Let's build a REST API with Express and PostgreSQL.</text>

  <!-- Turn 2 -->
  <rect x="16"  y="66" width="530" height="16" fill="#21262d" rx="3" style="animation:turnIn .3s .2s both;opacity:0"/>
  <text x="22"  y="78" class="mono turn" fill="#8b949e" style="animation:turnIn .3s .2s both;opacity:0">Turn  2  asst: Sure! We'll need Express routes, Prisma schema…</text>

  <!-- Turn 3 -->
  <rect x="16"  y="86" width="530" height="16" fill="#1a2e1a" rx="3" style="animation:turnIn .3s .3s both;opacity:0"/>
  <text x="22"  y="98" class="mono turn" fill="#3fb950" style="animation:turnIn .3s .3s both;opacity:0">Turn  3  user: Use PostgreSQL, add Prisma ORM.</text>

  <!-- Turn 4 -->
  <rect x="16"  y="106" width="530" height="16" fill="#21262d" rx="3" style="animation:turnIn .3s .4s both;opacity:0"/>
  <text x="22"  y="118" class="mono turn" fill="#8b949e" style="animation:turnIn .3s .4s both;opacity:0">Turn  4  asst: Here's the Prisma schema and routes setup…</text>

  <!-- Turn 5 -->
  <rect x="16"  y="126" width="530" height="16" fill="#1a2e1a" rx="3" style="animation:turnIn .3s .5s both;opacity:0"/>
  <text x="22"  y="138" class="mono turn" fill="#3fb950" style="animation:turnIn .3s .5s both;opacity:0">Turn  5  user: Add JWT authentication.</text>

  <!-- Turn 6 - evict badge -->
  <rect x="16"  y="146" width="530" height="16" fill="#21262d" rx="3" style="animation:turnIn .3s .6s both;opacity:0"/>
  <text x="22"  y="158" class="mono turn" fill="#8b949e" style="animation:turnIn .3s .6s both;opacity:0">Turn  6  asst: Install jsonwebtoken, create auth middleware…</text>
  <rect x="490" y="148" width="54" height="12" fill="#f85149" rx="6" style="animation:evictPulse 3s .6s infinite"/>
  <text x="517" y="158" class="mono" font-size="8" fill="#0d1117" text-anchor="middle" style="animation:evictPulse 3s .6s infinite">EVICT T1</text>

  <!-- Turn 7 -->
  <rect x="16"  y="166" width="530" height="16" fill="#1a2e1a" rx="3" style="animation:turnIn .3s .7s both;opacity:0"/>
  <text x="22"  y="178" class="mono turn" fill="#3fb950" style="animation:turnIn .3s .7s both;opacity:0">Turn  7  user: Now add rate limiting middleware.</text>

  <!-- Turn 8 -->
  <rect x="16"  y="186" width="530" height="16" fill="#21262d" rx="3" style="animation:turnIn .3s .8s both;opacity:0"/>
  <text x="22"  y="198" class="mono turn" fill="#8b949e" style="animation:turnIn .3s .8s both;opacity:0">Turn  8  asst: Use express-rate-limit, configure per-IP…</text>

  <!-- Turn 9 -->
  <rect x="16"  y="206" width="530" height="16" fill="#1a2e1a" rx="3" style="animation:turnIn .3s .9s both;opacity:0"/>
  <text x="22"  y="218" class="mono turn" fill="#3fb950" style="animation:turnIn .3s .9s both;opacity:0">Turn  9  user: Write tests for the auth endpoints.</text>

  <!-- Turn 10 -->
  <rect x="16"  y="226" width="530" height="16" fill="#21262d" rx="3" style="animation:turnIn .3s 1.0s both;opacity:0"/>
  <text x="22"  y="238" class="mono turn" fill="#8b949e" style="animation:turnIn .3s 1.0s both;opacity:0">Turn 10  asst: Here are Jest tests for POST /auth/login…</text>

  <!-- Right side: token count chart -->
  <text x="600" y="40" class="mono lbl">TOKEN COUNT OVER TIME</text>

  <!-- Bars: WITHOUT Terse (red, growing) -->
  <text x="602" y="60" class="mono" font-size="9" fill="#f85149" style="animation:tokenFlat .3s .2s both;opacity:0">without terse</text>

  <rect x="740" y="50" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .2s both;--bw:20px;width:0"/>
  <text x="763" y="60" class="mono tok" fill="#f85149" style="animation:tokenFlat .3s .4s both;opacity:0">200</text>

  <rect x="740" y="66" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .3s both;--bw:36px;width:0"/>
  <text x="779" y="76" class="mono tok" fill="#f85149" style="animation:tokenFlat .3s .5s both;opacity:0">360</text>

  <rect x="740" y="82" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .4s both;--bw:52px;width:0"/>
  <text x="795" y="92" class="mono tok" fill="#f85149" style="animation:tokenFlat .3s .6s both;opacity:0">520</text>

  <rect x="740" y="98" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .5s both;--bw:70px;width:0"/>

  <rect x="740" y="114" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .6s both;--bw:88px;width:0"/>

  <rect x="740" y="130" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .7s both;--bw:108px;width:0"/>

  <rect x="740" y="146" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .8s both;--bw:128px;width:0"/>

  <rect x="740" y="162" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s .9s both;--bw:148px;width:0"/>

  <rect x="740" y="178" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s 1.0s both;--bw:168px;width:0"/>

  <rect x="740" y="194" height="10" fill="#f85149" rx="2" style="animation:barGrow .4s 1.1s both;--bw:188px;width:0"/>
  <text x="600" y="205" class="mono" font-size="10" fill="#f85149" style="animation:tokenFlat .3s 1.4s both;opacity:0">10 turns: 1,880 tokens — hits limit!</text>

  <!-- Bars: WITH Terse (green, flat) -->
  <text x="602" y="230" class="mono" font-size="9" fill="#3fb950" style="animation:tokenFlat .3s 1.5s both;opacity:0">with terse</text>

  <rect x="740" y="224" height="8" fill="#3fb950" rx="2" style="animation:barGrow .4s 1.6s both;--bw:55px;width:0"/>
  <text x="600" y="245" class="mono" font-size="10" fill="#3fb950" style="animation:tokenFlat .3s 2.0s both;opacity:0">10 turns: 425 tokens — stays flat!</text>
  <text x="600" y="258" class="mono" font-size="9" fill="#8b949e" style="animation:tokenFlat .3s 2.2s both;opacity:0">memory.evictionCount: 6 · no overflow</text>
</svg>
