  <text x="560" y="202" class="mono" font-size="10" fill="#f85149" text-anchor="middle" style="animation:injectIn .3s 2.2s both;opacity:0">✗ [React hooks chunk — blocked, sim 0.95]</text>

  <!-- Final stats -->
