  <text x="60"  y="132" class="mono txt" fill="#8b949e" text-anchor="middle">JSONB cols</text>
  <text x="60"  y="144" class="mono txt" fill="#8b949e" text-anchor="middle">+ indexing</text>

  <rect x="10"  y="156" width="100" height="50" fill="#161b22" rx="6" stroke="#30363d" style="animation:docIn .4s .3s both;opacity:0"/>
