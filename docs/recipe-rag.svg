  <text x="60"  y="200" class="mono txt" fill="#8b949e" text-anchor="middle">components</text>

  <rect x="10"  y="212" width="100" height="50" fill="#161b22" rx="6" stroke="#30363d" style="animation:docIn .4s .4s both;opacity:0"/>
