  <text x="260" y="139" class="mono txt" fill="#3fb950" text-anchor="middle" style="animation:docIn .3s .9s both;opacity:0">cols + indexing</text>
  <text x="260" y="156" class="mono" font-size="9" fill="#3fb950" text-anchor="middle" style="animation:docIn .3s .9s both;opacity:0">sim: 0.78 ✓ NEW</text>

