  <text x="432" y="79" class="mono txt" fill="#3fb950" style="animation:injectIn .3s 1.9s both;opacity:0">in functional components. ↓ compressed</text>
  <text x="695" y="98" class="mono" font-size="9" fill="#3fb950" text-anchor="end" style="animation:injectIn .3s 2.0s both;opacity:0">84 tok</text>

