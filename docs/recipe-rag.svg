  <text x="432" y="147" class="mono txt" fill="#3fb950" style="animation:injectIn .3s 2.1s both;opacity:0">data with GIN indexing. ↓ compressed</text>
  <text x="695" y="166" class="mono" font-size="9" fill="#3fb950" text-anchor="end" style="animation:injectIn .3s 2.2s both;opacity:0">72 tok</text>

