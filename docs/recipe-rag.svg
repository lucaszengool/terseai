<svg width="820" height="290" viewBox="0 0 820 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes docIn    { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes retrieve { 0%,30%{opacity:0;stroke-dashoffset:60} 60%,100%{opacity:1;stroke-dashoffset:0} }
      @keyframes dupFlash { 0%,50%{opacity:0} 60%{opacity:1;fill:#f85149} 80%,100%{opacity:.8;fill:#f85149} }
      @keyframes compress { from{width:120px} to{width:56px} }
      @keyframes injectIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
      @keyframes arrowIn  { from{opacity:0} to{opacity:1} }
      @keyframes savePop  { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }

      .mono { font-family:'SF Mono','Fira Code','Courier New',monospace; }
      .lbl  { font-size:10px; font-weight:700; fill:#8b949e; letter-spacing:.06em; }
      .txt  { font-size:10.5px; }
    </style>
  </defs>

  <rect width="820" height="290" fill="#0d1117" rx="10"/>
